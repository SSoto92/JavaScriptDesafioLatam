<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conversor de Monedas Nacional</title>
  <link rel="stylesheet" href="./assets/css/styles.css" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <main class="contenedor-principal">
    <section class="card-conversor">
      <h1>Conversor de monedas Nacional</h1>

      <div class="formulario">
        <label for="monto">Pesos CLP</label>
        <input
          type="number"
          id="monto"
          placeholder="Ingrese el monto en CLP"
          min="1"
        />

        <label for="moneda">Moneda a convertir:</label>
        <select id="moneda">
          <option value="">Seleccione moneda</option>
        </select>

        <button id="btnConvertir">Buscar</button>

        <p id="resultado">Resultado: $0</p>
        <p id="error" class="mensaje-error"></p>
      </div>
    </section>

    <section class="card-grafico">
      <h2>Historial últimos 10 días</h2>
      <canvas id="graficoMoneda"></canvas>
    </section>
  </main>

  <script src="./assets/js/Scripts.js"></script>
</body>
</html>
